services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  keycloak:
    image: quay.io/keycloak/keycloak
    command: start-dev --hostname=http://localhost/auth --proxy-headers xforwarded
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false" # TODO - what is it
    volumes:
      - keycloak-volume:/opt/keycloak/data

volumes:
  keycloak-volume:
