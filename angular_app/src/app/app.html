<h1>App</h1>
<nav>
    <a routerLink="/">Home |</a>
    @if (this.auth.isAuthenticated()) {
        <a routerLink="/profile"> Profile |</a>
        @if (this.auth.isAdmin()) {
            <a routerLink="/admin"> Admin |</a>
        }
        <button (click)="this.logout()">Logout</button>
    } @else {
        <button (click)="this.auth.login()">Login</button>
    }
</nav>
<main>
    <router-outlet />
</main>
