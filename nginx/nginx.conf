# Main Context
user nginx;
worker_processes auto;

# Load the NJS module (Standard path for nginx:alpine)
load_module modules/ngx_http_js_module.so;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # NJS Integration
    js_import logger from forwarder.js;
    js_set $json_payload logger.format_json;

    server {
        listen 80;
        server_name localhost;

        # Ensure request body is captured for the mirror
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # Primary Mirror Directive
        mirror /internal-log-proxy;
        mirror_request_body on;

        # Internal location for sidecar API delivery
        location = /internal-log-proxy {
            internal;
            proxy_pass http://host.docker.internal:5000/capture;
            proxy_set_header Content-Type "application/json";
            proxy_set_body $json_payload;
            proxy_method POST;
        }

        # Keycloak
        location /auth/ {
            set $target_service "keycloak:8080";
            proxy_pass http://keycloak:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Spring boot BFF
        location /api/ {
            set $target_service "host.docker.internal:8081";
            proxy_pass http://host.docker.internal:8081/;
            proxy_set_header Host $host;
        }

        # Spring boot resource service
        location /resource/ {
            set $target_service "host.docker.internal:8082";
            proxy_pass http://host.docker.internal:8082/;
            proxy_set_header Host $host;
        }

        # Angular dev server
        location / {
            set $target_service "host.docker.internal:4200";
            proxy_pass http://host.docker.internal:4200/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}